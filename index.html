<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cuaca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body date-mode="day">
  <div class="weather-card" date-mode="day">
   <div class="sun"></div>
   <div class="moon"></div>

   <div class="weather-top">
    <h2 class="city">Jakarta</h2>
    <div class="date"></div>
    <div class="details-top"></div>
         <div class="humidity"></div>
         <div class="wind"></div>
   </div>

   <div class="weather-center">
    <div class="weather-icon"></div>
    <div class="temperature"></div>
   </div>

   <div id="forecast"></div>
</div>
</body>
</html>
